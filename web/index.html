<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资讯日报</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📬 资讯日报</h1>
      <p class="subtitle" id="update-time">加载中...</p>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="all">全部</button>
      <button class="tab" data-tab="stock">📊 股市</button>
      <button class="tab" data-tab="auto">🚗 汽车</button>
      <button class="tab" data-tab="book">📚 读书</button>
    </div>

    <div id="content">
      <p class="loading">⏳ 加载中...</p>
    </div>

    <footer>
      <p>每天北京时间 07:30 自动更新 · 数据来源：东方财富、36氪、虎嗅、Automotive News、豆瓣</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
